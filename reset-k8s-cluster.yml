---
- name: Reset Kubernetes Cluster
  hosts: all
  become: true
  vars_files:
    - vars/cluster_config.yml
  pre_tasks:
    - name: CONFIRM CLUSTER RESET
      ansible.builtin.pause:
        prompt: "WARNING: This playbook will completely DESTROY the Kubernetes cluster and delete all data. Type 'yes' to continue"
      register: confirm_reset

    - name: Abort if not confirmed
      ansible.builtin.fail:
        msg: "Reset aborted by user."
      when: 
        - (confirm_reset.user_input | default('') | lower) != 'yes'
        - (force_reset | default('no') | lower) != 'yes'

  tasks:
    # Step 1: Disable swap (if not already done)
    - name: Disabling SWAP
      ansible.builtin.command: swapoff --all
      changed_when: false
      when: ansible_distribution in ["Ubuntu", "Debian", "Fedora"]

    - name: Disable SWAP permanently
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: ^([^#].*?\sswap\s+sw\s+.*)$
        replace: "# \\1"
      when: ansible_distribution in ["Ubuntu", "Debian", "Fedora"]

    # Step 2: Reset Kubernetes using kubeadm
    - name: Reset Kubernetes using kubeadm
      ansible.builtin.command: kubeadm reset -f
      register: reset_output
      changed_when: "'reset successful' in (reset_output.stdout | default('') | lower)"
      ignore_errors: true

    - name: Show kubeadm reset output
      ansible.builtin.debug:
        msg: "{{ reset_output.stdout }}"

    - name: Remove kubelet config
      ansible.builtin.file:
        path: /var/lib/kubelet/config.yaml
        state: absent
      ignore_errors: true

    - name: Remove kubeconfig
      ansible.builtin.file:
        path: "~{{ kube_user }}/.kube/config"
        state: absent
      ignore_errors: true

    # Step 3: Remove network configuration (flannel, calico, etc.)
    - name: Remove network configuration files
      ansible.builtin.file:
        path: /etc/cni/net.d/{{ item }}
        state: absent
      loop:
        - 10-flannel.conflist
        - 10-calico.conflist
      ignore_errors: true # Ignore errors if the files do not exist

    # Step 4: Remove containerd containers (instead of Docker)
    - name: Remove containerd containers related to Kubernetes
      ansible.builtin.shell: crictl rm --all
      ignore_errors: true
      changed_when: false

    - name: Remove Kubernetes container images
      ansible.builtin.shell: crictl rmi --all
      ignore_errors: true
      changed_when: false

    # Step 5: Remove Kubernetes directories and files
    - name: Remove Kubernetes directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/kubernetes
        - /var/lib/kubelet
        - /var/lib/etcd
        - /var/run/kubernetes
      ignore_errors: true

    # Step 6: Reset firewall and network interfaces (Optional)
    - name: Remove firewall rules related to Kubernetes
      ansible.builtin.command: iptables -F
      changed_when: false
      ignore_errors: true

    # Step 7: Stop and disable kubelet service
    - name: Stop and disable kubelet service
      ansible.builtin.systemd:
        name: kubelet
        state: stopped
        enabled: false
      ignore_errors: true

    # Step 8: Stop and disable CRI-O service
    - name: Stop and disable CRI-O service
      ansible.builtin.systemd:
        name: crio
        state: stopped
        enabled: false
      ignore_errors: true

    # Step 9: Remove Kubernetes and CRI-O packages (Ubuntu)
    - name: Remove Kubernetes and CRI-O packages (Ubuntu)
      ansible.builtin.apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
          - kubernetes-cni
          - cri-o
          - cri-o-runc
          - cri-tools
        state: absent
        purge: true
      when: 
        - ansible_distribution == 'Ubuntu'
        - remove_packages | bool

    # Step 10: Remove Kubernetes and CRI-O packages (RHEL/CentOS/Fedora)
    - name: Remove Kubernetes and CRI-O packages (RHEL/CentOS/Fedora)
      ansible.builtin.dnf:
        name:
          - kubelet
          - kubeadm
          - kubectl
          - kubernetes-cni
          - cri-o
          - cri-tools
        state: absent
      when: 
        - ansible_distribution in ['RedHat', 'CentOS', 'Fedora']
        - remove_packages | bool
      ignore_errors: true

    # Step 11: Remove Repositories and Keys (Ubuntu)
    - name: Remove apt repositories and keys (Ubuntu)
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/kubernetes.list
        - /etc/apt/sources.list.d/cri-o.list
        - /etc/apt/keyrings/kubernetes-apt-keyring.gpg
        - /etc/apt/keyrings/cri-o-apt-keyring.gpg
        - /tmp/kubernetes-release-key.gpg
        - /etc/apt/keyrings/kubernetes-apt-keyring.gpg~
        - /etc/apt/sources.list.d/devel:kubic:libcontainers:stable.list
      when: 
        - ansible_distribution == 'Ubuntu'
        - remove_packages | bool

    # Step 12: Remove Repositories (RHEL/CentOS/Fedora)
    - name: Remove yum repositories (RHEL/CentOS/Fedora)
      ansible.builtin.file:
        path: "/etc/yum.repos.d/{{ item }}"
        state: absent
      loop:
        - kubernetes.repo
        - crio.repo
      when: 
        - ansible_distribution in ['RedHat', 'CentOS', 'Fedora']
        - remove_packages | bool

    # Step 13: Remove CRI-O and containerd directories
    - name: Remove container runtime directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/crio
        - /var/lib/containers
        - /opt/cni
        - /var/lib/cni
        - /var/log/containers
        - /var/log/pods
      when: remove_packages | bool
      ignore_errors: true
