---
- block:
    - name: Setup networking of kubernetes
      ansible.builtin.blockinfile:
        path: /etc/modules-load.d/containerd.conf
        block: |
          overlay
          br_netfilter
        backup: true
        create: true
        mode: "0644"
      when: runtime == "containerd"
    - name: Setup kernel parameters of kubernetes
      ansible.builtin.blockinfile:
        path: /etc/sysctl.d/kubernetes.conf
        block: |
          net.bridge.bridge-nf-call-ip6tables = 1
          net.bridge.bridge-nf-call-iptables = 1
          net.ipv4.ip_forward = 1
        backup: true
        create: true
        mode: "0644"
    - name: Add the overlay module
      community.general.modprobe:
        name: overlay
        state: present
    - name: Add the br_netfilter module
      community.general.modprobe:
        name: br_netfilter
        state: present
    - name: Reloading Sysctl
      become: true
      ansible.builtin.command: sysctl --system
      changed_when: false
    - name: Disable swap for Ubuntu
      ansible.builtin.command: swapoff -a
      changed_when: false
      when: ansible_distribution == "Ubuntu"

    - name: Disable swap permanently for Ubuntu
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: ^([^#].*?\sswap\s+sw\s+.*)$
        replace: "# \\1"
      when: ansible_distribution == "Ubuntu"

    - name: Disable swap for Fedora and other systems with ZRAM
      ansible.builtin.command: swapoff -a
      changed_when: false
      when: ansible_distribution in ["Fedora", "CentOS", "RHEL"]

    - name: Uninstall zram-generator package (Fedora, CentOS, RHEL)
      ansible.builtin.package:
        name: zram-generator-defaults
        state: absent
      when: ansible_distribution in ["Fedora", "CentOS", "RHEL"]
      become: true

    - name: Ensure ZRAM swap is disabled permanently (Fedora, CentOS, RHEL)
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: ^([^#].*?\szram\s+.*)$
        replace: "# \\1"
      when: ansible_distribution in ["Fedora", "CentOS", "RHEL"]

    - name: Remove any ZRAM swap configuration files (Fedora, CentOS, RHEL)
      ansible.builtin.file:
        path: /etc/systemd/system/zram.service
        state: absent
      when: ansible_distribution in ["Fedora", "CentOS", "RHEL"]
      become: true
