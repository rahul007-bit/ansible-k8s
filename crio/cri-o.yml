---
- when: runtime == "crio"
  block:
    - name: Importing os updates
      ansible.builtin.include_tasks: ./install/os_updates.yml

    # ---- Stop containerd if present (switching to CRI-O) ----
    - name: Stop and disable containerd if present (switching to CRI-O)
      ansible.builtin.service:
        name: containerd
        state: stopped
        enabled: false
      ignore_errors: true
      changed_when: false

    # ---- Ubuntu ----
    - name: Install dependencies for CRI-O repo (Ubuntu)
      ansible.builtin.apt:
        name:
          - curl
          - gpg
          - apt-transport-https
        state: present
      when: ansible_distribution == 'Ubuntu'

    - name: Add CRI-O GPG key (Ubuntu)
      ansible.builtin.shell: |
        curl -fsSL https://pkgs.k8s.io/addons:/cri-o:/stable:/{{ crio_version }}/deb/Release.key |
        gpg --dearmor -o /etc/apt/keyrings/cri-o-apt-keyring.gpg --yes
      args:
        creates: /etc/apt/keyrings/cri-o-apt-keyring.gpg
      when: ansible_distribution == 'Ubuntu'

    - name: Remove legacy openSUSE kubic CRI-O repositories (Ubuntu)
      ansible.builtin.shell: rm -f /etc/apt/sources.list.d/devel:kubic*
      when: ansible_distribution == 'Ubuntu'

    - name: Add CRI-O apt repository (Ubuntu)
      ansible.builtin.apt_repository:
        repo: >-
          deb [trusted=yes signed-by=/etc/apt/keyrings/cri-o-apt-keyring.gpg]
          https://pkgs.k8s.io/addons:/cri-o:/stable:/{{ crio_version }}/deb/ /
        state: present
        filename: cri-o
      when: ansible_distribution == 'Ubuntu'

    - name: Install CRI-O (Ubuntu)
      ansible.builtin.apt:
        name: cri-o
        state: latest
        update_cache: true
        dpkg_options: 'force-overwrite'
      when: ansible_distribution == 'Ubuntu'

    # ---- RHEL / CentOS / Fedora (Online)----
    - name: Remove broken legacy cri-o.repo (RHEL/CentOS/Fedora)
      ansible.builtin.file:
        path: /etc/yum.repos.d/cri-o.repo
        state: absent
      when: 
        - ansible_distribution in ['RedHat', 'CentOS', 'Fedora']
        - not offline_install

    - name: Add CRI-O package repo (RHEL/CentOS/Fedora)
      ansible.builtin.yum_repository:
        name: crio
        description: CRI-O
        baseurl: "https://pkgs.k8s.io/addons:/cri-o:/stable:/{{ crio_version }}/rpm/"
        gpgcheck: true
        gpgkey: "https://pkgs.k8s.io/addons:/cri-o:/stable:/{{ crio_version }}/rpm/repodata/repomd.xml.key"
        enabled: true
      when: 
        - ansible_distribution in ['RedHat', 'CentOS', 'Fedora']
        - not offline_install

    - name: Install CRI-O (RHEL/CentOS/Fedora)
      ansible.builtin.dnf:
        name: "cri-o-{{ crio_version | regex_replace('^v', '') }}.*"
        state: present
        allow_downgrade: true
        disable_gpg_check: true
      when: 
        - ansible_distribution in ['RedHat', 'CentOS', 'Fedora']
        - not offline_install

    # ---- Offline Installation (RPM) ----
    - name: Install CRI-O from local files (Offline - RPM)
      ansible.builtin.shell: "dnf install -y --disablerepo=* {{ remote_pkg_dir }}/*.rpm"
      when: 
        - offline_install
        - ansible_distribution in ['Fedora', 'RedHat', 'CentOS']

    # ---- Offline Installation (DEB) ----
    - name: Install CRI-O from local files (Offline - DEB)
      ansible.builtin.shell: "dpkg -i {{ remote_pkg_dir }}/**/cri-o*.deb || apt-get install -f -y"
      when: 
        - offline_install
        - ansible_distribution == 'Ubuntu'

    # ---- Enable and start CRI-O ----
    - name: Enable and start CRI-O service
      ansible.builtin.service:
        name: crio
        state: started
        enabled: true
